title: Корепин Вадим Николаевич
description: Кандидат экономических наук, доцент НИУ ВШЭ, признанный эксперт в области логистики и цифровой трансформации. Более 25 лет посвятил развитию ИТ‑решений и управлению цепями поставок, стоял у истоков внедрения передовых ERP- и SCM-систем в России.
  Автор фундаментальных трудов по логистике, наставник поколений специалистов.
content: |
  Корепин Вадим Николаевич — специалист в сфере ИТ и логистики, кандидат экономических наук, доцент.

  ### Основные должности и места работы
  Директор по развитию компании «Winbyte» (ГК «Ланит»).

  Доцент кафедры информационных систем и технологий факультета логистики (департамента операционного менеджмента и логистики) НИУ ВШЭ.

  Ранее занимал руководящие позиции в крупных технологических компаниях, включая Microsoft и SAP.

  В Lansoft отвечает за развитие бизнеса, внедрение стратегий роста и расширение присутствия компании на рынке ИТ‑решений. Руководит центром экспертизы, объединяющим отраслевых архитекторов.

  ### Образование и квалификация
  Кандидат экономических наук.

  Сертифицированный профессионал в области управления цепями поставок (APICS CSCP).

  ### Профессиональный опыт и компетенции
  Более 25 лет опыта в цифровой трансформации, ИТ‑стратегиях и корпоративных бизнес‑приложениях.

  Проектирование, продвижение и внедрение информационных систем управления разных классов: ERP, CRM, WMS и др.

  Специализация на комплексной цифровой трансформации компаний и реинжиниринге логистических бизнес‑процессов в цепях поставок.

  Опыт разработки и внедрения SCM‑проектов (управление цепями поставок).

  Оценка и обоснование стоимости ИТ‑проектов, создание внутренних инструментов для оценки стоимости.

  Развитие новых продуктов и вывод их на рынок, пресейл, маркетинг и продвижение.

  Участие в проектах цифровой трансформации в области логистики и производства в крупных международных компаниях в роли ведущего функционального архитектора.

  Экспертиза в экосистеме продуктов Microsoft Dynamics и SAP (внедрение, повышение активности использования, формирование информационной стратегии развития компании).

  ### Ключевые направления деятельности
  Управление цепями поставок (SCM).

  Логистика складирования и распределения.

  Корпоративная логистика.

  ИТ‑консалтинг и аналитика в области логистики.

  Разработка и внедрение ИТ‑решений для оптимизации бизнес‑процессов.

  Построение гибридных ИТ‑архитектур (сочетание российских и зарубежных решений).

  Внедрение low‑code‑платформ и современных BI‑систем.

  ### Участие в образовательных программах
  Преподавание в НИУ ВШЭ (курсы по логистике и управлению цепями поставок).

  Академический руководитель программы Executive Master in SCM and Logistics «Бизнес‑аналитика при оптимизации логистики и цепей поставок».

  Разработка корпоративных обучающих программ по логистике и УЦП.

  ### Публикации и научные труды
  Автор научных работ, монографий и учебных пособий по логистике, управлению цепями поставок и цифровой трансформации. Среди значимых публикаций:

  «Управление складированием в цепях поставок» (Изд‑во «Альфа‑Пресс», 2008).

  «Логистика» в 2‑х томах (Изд‑во «Юрайт», 2019).

  «Логистика складирования» (Изд‑во «Юрайт», 2011).

  «Корпоративная логистика в вопросах и ответах» (Изд‑во ИНФРА‑М, 2018).

  «Цифровые технологии в логистике и управлении цепями поставок».

  «Управление цепями поставок» (Изд‑во «Юрайт», 2019).

  «Логистика снабжения» (Изд‑во «Юрайт», 2022).

  «Управление закупками и запасами» (Изд‑во ИНФРА‑М, 2023).
